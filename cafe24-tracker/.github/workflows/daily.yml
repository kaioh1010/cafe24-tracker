name: cafe24-daily-sales

on:
  schedule:
    # 매일 KST 04:00 (UTC 19:00). cron은 UTC 기준, 실행 지연 가능.
    - cron: "0 19 * * *"
  workflow_dispatch:   # 수동 실행 + 과거 날짜 백필용
    inputs:
      target_date:
        description: "수집할 날짜 (YYYY-MM-DD, 비우면 전날)"
        required: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pynacl

      - name: Run tracker
        env:
          MALL_ID: ${{ secrets.MALL_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: python tracker.py

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/daily_sales.csv
          git diff --staged --quiet || git commit -m "data: $(date -u +%Y-%m-%d) sales"
          git push

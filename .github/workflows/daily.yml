name: cafe24-daily-sales

on:
  schedule:
    # 전날 확정치: 매일 KST 04:00 (UTC 19:00) - 어제 날짜 수집
    - cron: "0 19 * * *"
    # 당일 수집: KST 09/12/15/18시 (UTC 00/03/06/09시) - KST 오늘 수집
    - cron: "0 0 * * *"
    - cron: "0 3 * * *"
    - cron: "0 6 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "수집할 날짜 (YYYY-MM-DD, 비우면 KST 오늘)"
        required: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pynacl
      - name: 수집 날짜 결정
        id: pick
        run: |
          echo "event=${{ github.event_name }} schedule=[${{ github.event.schedule }}]"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "0 19 * * *" ]; then
            # 04시 확정치 스케줄: 어제(KST) 수집
            echo "date=$(TZ=Asia/Seoul date -d 'yesterday' +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          else
            # 당일 스케줄 및 수동 실행: 입력값 우선, 없으면 tracker.py가 KST 오늘 수집
            echo "date=${{ github.event.inputs.target_date }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Run tracker
        env:
          MALL_ID: ${{ secrets.MALL_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
          TARGET_DATE: ${{ steps.pick.outputs.date }}
        run: python tracker.py
      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/daily_sales.csv
          git diff --staged --quiet || git commit -m "data: $(TZ=Asia/Seoul date +%Y-%m-%dT%H:%M) sales"
          git push
